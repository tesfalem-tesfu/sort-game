services:
  - type: web
    name: sort-game-60
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sorting-quiz-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://sort-game-frroo.onrender.com

  - type: web
    name: sort-game-frroo
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sort-game-60.onrender.com

databases:
  - name: sorting-quiz-db
    databaseName: sorting_quiz
    plan: free
